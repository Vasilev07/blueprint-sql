<div class="compose-container">
  <div class="compose-header">
    <button pButton
            type="button"
            icon="pi pi-arrow-left"
            class="p-button-text p-button-rounded"
            pTooltip="Back to Messages"
            (click)="onCancel()">
    </button>
    <h2>New Message</h2>
    <div class="header-actions">
      <button pButton
              type="button"
              icon="pi pi-paperclip"
              class="p-button-text p-button-rounded"
              pTooltip="Attach File"
              (click)="fileInput.click()">
      </button>
      <input #fileInput
             type="file"
             multiple
             style="display: none"
             (change)="onFileSelect($event)">
    </div>
  </div>

  <div class="compose-content">
    <div class="recipients-section">
      <div class="recipients-header">
        <span class="label">To:</span>
        <div class="recipients-input">
          <p-multiSelect
            [options]="users()"
            [ngModel]="selectedRecipients()"
            (ngModelChange)="selectedRecipients.set($event)"
            optionLabel="email"
            optionValue="email"
            placeholder="Search or select recipients..."
            [filter]="true"
            [showClear]="true"
            class="recipients-dropdown">
          </p-multiSelect>
        </div>
      </div>

      <div class="cc-bcc-toggle">
        <button pButton
                type="button"
                label="CC"
                class="p-button-text p-button-sm"
                [class.active]="showCC()"
                (click)="toggleCC()">
        </button>
        <button pButton
                type="button"
                label="BCC"
                class="p-button-text p-button-sm"
                [class.active]="showBCC()"
                (click)="toggleBCC()">
        </button>
      </div>

      @if (showCC()) {
        <div class="cc-section">
          <span class="label">CC:</span>
          <p-multiSelect
            [options]="users()"
            [ngModel]="selectedCC()"
            (ngModelChange)="selectedCC.set($event)"
            optionLabel="email"
            optionValue="email"
            placeholder="Add CC recipients..."
            [filter]="true"
            [showClear]="true"
            class="cc-dropdown">
          </p-multiSelect>
        </div>
      }

      @if (showBCC()) {
        <div class="bcc-section">
          <span class="label">BCC:</span>
          <p-multiSelect
            [options]="users()"
            [ngModel]="selectedBCC()"
            (ngModelChange)="selectedBCC.set($event)"
            optionLabel="email"
            optionValue="email"
            placeholder="Add BCC recipients..."
            [filter]="true"
            [showClear]="true"
            class="bcc-dropdown">
          </p-multiSelect>
        </div>
      }
    </div>

    <div class="subject-section">
      <input pInputText
             type="text"
             placeholder="Subject"
             [ngModel]="subject()"
             (ngModelChange)="subject.set($event)"
             class="subject-input">
    </div>

    <div class="message-body-section">
      <textarea pInputTextarea
                [ngModel]="content()"
                (ngModelChange)="content.set($event)"
                placeholder="Type your message here..."
                class="message-textarea">
      </textarea>
    </div>

    @if (attachments().length > 0) {
      <div class="attachments-section">
        <div class="attachments-header">
          <span class="label">Attachments ({{ attachments().length }})</span>
          <button pButton
                  type="button"
                  icon="pi pi-times"
                  class="p-button-text p-button-sm"
                  (click)="clearAttachments()">
          </button>
        </div>
        <div class="attachments-list">
          @for (file of attachments(); track file.name + file.size + $index) {
            <div class="attachment-item">
              <div class="attachment-info">
                <i class="pi pi-file"></i>
                <span class="file-name">{{ file.name }}</span>
                <span class="file-size">({{ formatFileSize(file.size) }})</span>
              </div>
              <button pButton
                      type="button"
                      icon="pi pi-times"
                      class="p-button-text p-button-sm p-button-danger"
                      (click)="removeAttachment($index)">
              </button>
            </div>
          }
        </div>
      </div>
    }
  </div>

  <div class="compose-footer">
    <div class="footer-left">
      <button pButton
              type="button"
              icon="pi pi-paperclip"
              class="p-button-text p-button-rounded"
              pTooltip="Attach File"
              (click)="fileInput.click()">
      </button>
      <button pButton
              type="button"
              icon="pi pi-image"
              class="p-button-text p-button-rounded"
              pTooltip="Add Image"
              (click)="addImage()">
      </button>
    </div>

    <div class="footer-right">
      <button pButton
              type="button"
              label="Save Draft"
              class="p-button-outlined p-button-sm"
              (click)="saveDraft()">
      </button>
      <button pButton
              type="button"
              label="Send"
              icon="pi pi-send"
              class="p-button-primary"
              [loading]="loading()"
              [disabled]="!isFormValid()"
              (click)="onSubmit()">
      </button>
    </div>
  </div>
</div>
